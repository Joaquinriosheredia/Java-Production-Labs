version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: lab10-k8s-autoscaling
    ports:
      - "8089:8089"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8089/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
