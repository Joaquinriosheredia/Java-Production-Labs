version: "3.9"

services:
  app-optimized:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: lab09-optimized
    ports:
      - "8088:8088"
    # Simulate container resource limits (as in Kubernetes)
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
