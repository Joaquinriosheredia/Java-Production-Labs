version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: lab03-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: lab03-rate-limiter
    ports:
      - "8082:8082"
    environment:
      SPRING_DATA_REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/api/v1/health-check || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
