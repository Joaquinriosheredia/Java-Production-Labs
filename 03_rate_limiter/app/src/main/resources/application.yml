spring:
  application:
    name: lab-03-rate-limiter
  threads:
    virtual:
      enabled: true
  data:
    redis:
      url: redis://localhost:6379
      connect-timeout: 2s
      timeout: 1s

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  metrics:
    tags:
      lab: "03_rate_limiter"

rate-limiter:
  capacity: 20
  refill-tokens: 1
  refill-period-millis: 100  # greedy: 1 token every 100ms = 10 tokens/s, no burst spike

resilience4j:
  circuitbreaker:
    instances:
      redis:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 60
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

logging:
  level:
    com.labs: DEBUG
