spring:
  application:
    name: lab-01-virtual-threads
  threads:
    virtual:
      enabled: true   # Spring Boot 3.2: enables virtual threads for Tomcat + async tasks

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true   # Required in Spring Boot 3.2 — not enabled by default
  metrics:
    tags:
      lab: "01_virtual_threads"
      application: ${spring.application.name}

logging:
  level:
    com.labs: DEBUG
