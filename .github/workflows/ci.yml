name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  validate-structure:
    name: Validate Lab Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check mandatory artifacts per lab
        run: |
          LABS=(
            01_virtual_threads
            02_resilience
            03_rate_limiter
            04_outbox_kafka
            05_saga_pattern
            06_redis_vs_kafka
            07_postgres_tuning
            08_kafka_streams
            09_docker_optimization
            10_kubernetes_autoscaling
          )
          FAILED=0
          for lab in "${LABS[@]}"; do
            echo "==> Checking $lab"
            for f in \
              "$lab/README.md" \
              "$lab/docs/adr/ADR-0001.md" \
              "$lab/benchmark/README.md" \
              "$lab/benchmark/run-benchmark.sh" \
              "$lab/chaos/simulate-failure.sh" \
              "$lab/docker/docker-compose.yml" \
              "$lab/pom.xml"; do
              if [ ! -f "$f" ]; then
                echo "  MISSING: $f"
                FAILED=1
              fi
            done
          done
          if [ $FAILED -ne 0 ]; then
            echo "Structure validation FAILED"
            exit 1
          fi
          echo "All labs pass structure validation"

  build-and-test:
    name: Build & Test — ${{ matrix.lab }}
    runs-on: ubuntu-latest
    needs: validate-structure
    strategy:
      fail-fast: false
      matrix:
        lab:
          - 01_virtual_threads
          - 02_resilience
          - 03_rate_limiter
          - 04_outbox_kafka
          - 05_saga_pattern
          - 06_redis_vs_kafka
          - 07_postgres_tuning
          - 08_kafka_streams
          - 09_docker_optimization
          - 10_kubernetes_autoscaling

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: |
          cd ${{ matrix.lab }}
          chmod +x mvnw
          ./mvnw verify -B -Dspring.profiles.active=test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.lab }}
          path: ${{ matrix.lab }}/target/surefire-reports/

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.build-and-test.result }}" != "success" ]; then
            echo "One or more labs failed CI"
            exit 1
          fi
          echo "All labs passed CI"
