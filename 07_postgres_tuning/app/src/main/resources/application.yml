spring:
  application:
    name: lab-07-postgres-tuning
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/pgtuning_lab
    username: labs
    password: labs
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: false
        format_sql: false
  flyway:
    locations: classpath:db/migration

server:
  port: 8086

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  metrics:
    tags:
      lab: "07_postgres_tuning"
