version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: lab07-postgres
    environment:
      POSTGRES_USER: labs
      POSTGRES_PASSWORD: labs
      POSTGRES_DB: pgtuning_lab
    ports:
      - "5434:5432"
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c log_min_duration_statement=100
      -c log_statement=all
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labs"]
      interval: 5s
      timeout: 5s
      retries: 10
