global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'lab-01-virtual-threads'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: /actuator/prometheus

  - job_name: 'lab-02-resilience'
    static_configs:
      - targets: ['host.docker.internal:8081']
    metrics_path: /actuator/prometheus

  - job_name: 'lab-03-rate-limiter'
    static_configs:
      - targets: ['host.docker.internal:8082']
    metrics_path: /actuator/prometheus

  - job_name: 'lab-04-outbox-kafka'
    static_configs:
      - targets: ['host.docker.internal:8083']
    metrics_path: /actuator/prometheus

  - job_name: 'lab-05-saga-pattern'
    static_configs:
      - targets: ['host.docker.internal:8084']
    metrics_path: /actuator/prometheus

  - job_name: 'lab-06-redis-vs-kafka'
    static_configs:
      - targets: ['host.docker.internal:8085']
    metrics_path: /actuator/prometheus

  - job_name: 'lab-07-postgres-tuning'
    static_configs:
      - targets: ['host.docker.internal:8086']
    metrics_path: /actuator/prometheus

  - job_name: 'lab-08-kafka-streams'
    static_configs:
      - targets: ['host.docker.internal:8087']
    metrics_path: /actuator/prometheus

  - job_name: 'lab-09-docker-optimization'
    static_configs:
      - targets: ['host.docker.internal:8088']
    metrics_path: /actuator/prometheus

  - job_name: 'lab-10-kubernetes-autoscaling'
    static_configs:
      - targets: ['host.docker.internal:8089']
    metrics_path: /actuator/prometheus
